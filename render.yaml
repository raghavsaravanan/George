# Render Blueprint — George voice webhook API
# Docs: https://render.com/docs/blueprint-spec
services:
  - type: web
    name: george-api
    runtime: python
    plan: free
    region: oregon
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.8"
      - key: QDRANT_URL
        sync: false
      - key: QDRANT_API_KEY
        sync: false
      - key: VAPI_WEBHOOK_SECRET
        sync: false
